apiVersion: v1
kind: Secret
metadata:
  name: ubiwell-secret
  namespace: ubiwell
type: Opaque
stringData:
  POSTGRES_USER: ubiwell
  POSTGRES_PASSWORD: ubiwell
  JWT_SECRET: replace-with-strong-secret
  AUTH_USERS_JSON: '[{"username":"researcher","password_hash":"$2b$12$replace-with-bcrypt-hash","role":"researcher","tenant_id":"tenant-a"}]'
