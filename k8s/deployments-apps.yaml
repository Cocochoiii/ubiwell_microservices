apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: ubiwell
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: ubiwell/api-gateway:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: ubiwell-config
            - secretRef:
                name: ubiwell-secret
---
