global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: api-gateway
    metrics_path: /metrics
    static_configs:
      - targets: ["api-gateway:8000"]

  - job_name: participant-service
    metrics_path: /metrics
    static_configs:
      - targets: ["participant-service:8001"]

  - job_name: survey-service
    metrics_path: /metrics
    static_configs:
      - targets: ["survey-service:8002"]

  - job_name: ingestion-service
    metrics_path: /metrics
    static_configs:
      - targets: ["ingestion-service:8003"]

  - job_name: analytics-service
    metrics_path: /metrics
    static_configs:
      - targets: ["analytics-service:8004"]
